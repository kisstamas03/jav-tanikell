<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teszt eredmény – EduFlow</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #F0F4FF;
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: #111827;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .result-wrap { width: 100%; max-width: 520px; }

    .result-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,.08);
      padding: 44px 40px;
      text-align: center;
      border: 1px solid #E5E9F2;
    }

    /* Already-completed banner */
    .already-banner {
      background: #FFFBEB; border: 1px solid #FDE68A; border-radius: 10px;
      padding: 12px 16px; margin-bottom: 24px;
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; color: #92400E; text-align: left;
    }
    .already-banner i { font-size: 16px; flex-shrink: 0; color: #D97706; }

    /* Result icon */
    .result-icon {
      width: 96px; height: 96px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 38px; margin: 0 auto 24px; color: #fff;
    }
    .icon-success { background: linear-gradient(135deg,#10B981,#059669); box-shadow: 0 8px 20px rgba(16,185,129,.3); }
    .icon-warning { background: linear-gradient(135deg,#F59E0B,#D97706); box-shadow: 0 8px 20px rgba(245,158,11,.3); }
    .icon-danger  { background: linear-gradient(135deg,#EF4444,#DC2626); box-shadow: 0 8px 20px rgba(239,68,68,.3); }

    .result-headline { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 24px; margin-bottom: 6px; }
    .result-sub { font-size: 14px; color: #9CA3AF; margin-bottom: 28px; }

    /* Score */
    .score-big { font-family: 'Outfit', sans-serif; font-size: 56px; font-weight: 800; color: #111827; line-height: 1; margin-bottom: 4px; }
    .score-label { font-size: 14px; color: #9CA3AF; margin-bottom: 24px; }

    /* Grade display */
    .grade-display { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 24px; }
    .grade-circle {
      width: 68px; height: 68px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 28px; color: #fff;
    }
    .gc1 { background: linear-gradient(135deg,#EF4444,#DC2626); }
    .gc2 { background: linear-gradient(135deg,#F97316,#EA580C); }
    .gc3 { background: linear-gradient(135deg,#EAB308,#CA8A04); }
    .gc4 { background: linear-gradient(135deg,#22C55E,#16A34A); }
    .gc5 { background: linear-gradient(135deg,#3B6FE8,#2952C8); }
    .grade-info { text-align: left; }
    .grade-name { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 20px; }
    .grade-sub  { font-size: 13px; color: #9CA3AF; }

    /* Details box */
    .details-box { background: #F8FAFF; border-radius: 12px; padding: 18px 20px; margin-bottom: 22px; text-align: left; }
    .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; font-size: 14px; color: #334155; border-bottom: 1px solid #E5E9F2; }
    .detail-row:last-child { border-bottom: none; font-weight: 700; }
    .detail-row .lbl { color: #9CA3AF; }

    /* Threshold table */
    .thresh-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 24px; border-radius: 10px; overflow: hidden; }
    .thresh-table th { background: #F8FAFF; padding: 8px 12px; text-align: left; font-weight: 700; font-size: 11px; color: #9CA3AF; text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid #E5E9F2; }
    .thresh-table td { padding: 8px 12px; border-bottom: 1px solid #F3F6FB; color: #374151; }
    .thresh-table tr.highlight td { background: #EEF4FF; font-weight: 700; color: #3B6FE8; }
    .thresh-table tr:last-child td { border-bottom: none; }

    /* Back button */
    .btn-back {
      display: block; background: #3B6FE8; color: #fff;
      text-decoration: none; padding: 14px;
      border-radius: 12px; font-size: 15px; font-weight: 700;
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: all .2s; text-align: center;
    }
    .btn-back:hover { background: #2952C8; color: #fff; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(59,111,232,.3); }
  </style>
</head>
<body>
<div class="result-wrap">
  <div class="result-card">

    <!-- Csak 1x kitölthető banner -->
    <div class="already-banner" th:if="${alreadyCompleted}">
      <i class="fas fa-lock"></i>
      <div><strong>Ez a teszt csak egyszer tölthető ki.</strong><br>Az alábbi az előző kitöltésed eredménye.</div>
    </div>

    <!-- Ikon -->
    <div class="result-icon"
         th:class="'result-icon ' + (${percentage >= 75} ? 'icon-success' : (${percentage >= 40} ? 'icon-warning' : 'icon-danger'))">
      <i th:class="${grade >= 2} ? 'fas fa-trophy' : 'fas fa-times-circle'"></i>
    </div>

    <!-- Felirat -->
    <div class="result-headline"
         th:text="${grade == 5} ? 'Kiváló!' : (${grade == 4} ? 'Szép munka!' : (${grade == 3} ? 'Megfelelt!' : (${grade == 2} ? 'Gyengén átment!' : 'Sajnáljuk...')))">
    </div>
    <div class="result-sub">
      A(z) <strong th:text="${quiz.title}">Teszt neve</strong> teszt eredménye
    </div>

    <!-- Százalék -->
    <div class="score-big" th:text="${percentage} + '%'">85%</div>
    <div class="score-label">Elért eredmény</div>

    <!-- Jegy -->
    <div class="grade-display">
      <div class="grade-circle"
           th:class="'grade-circle gc' + ${grade}"
           th:text="${grade}">5</div>
      <div class="grade-info">
        <div class="grade-name"
             th:text="${grade == 5} ? 'Jeles' : (${grade == 4} ? 'Jó' : (${grade == 3} ? 'Közepes' : (${grade == 2} ? 'Elégséges' : 'Elégtelen')))">
        </div>
        <div class="grade-sub">Érdemjegy</div>
      </div>
    </div>

    <!-- Részletek -->
    <div class="details-box">
      <div class="detail-row">
        <span class="lbl">Összes kérdés</span>
        <span th:text="${totalQuestions}">10</span>
      </div>
      <div class="detail-row">
        <span class="lbl">Helyes válaszok</span>
        <span style="color:#16A34A;font-weight:700;" th:text="${score}">8</span>
      </div>
      <div class="detail-row">
        <span class="lbl">Hibás válaszok</span>
        <span style="color:#DC2626;font-weight:700;" th:text="${totalQuestions - score}">2</span>
      </div>
    </div>

    <!-- Ponthatár táblázat -->
    <table class="thresh-table">
      <thead>
        <tr><th>Jegy</th><th>Elnevezés</th><th>Határ</th></tr>
      </thead>
      <tbody>
        <tr th:classappend="${grade == 5} ? 'highlight' : ''">
          <td><strong>5</strong></td><td>Jeles</td>
          <td th:text="${quiz.excellentThreshold} + '%+'"></td>
        </tr>
        <tr th:classappend="${grade == 4} ? 'highlight' : ''">
          <td><strong>4</strong></td><td>Jó</td>
          <td th:text="${goodRange}"></td>
        </tr>
        <tr th:classappend="${grade == 3} ? 'highlight' : ''">
          <td><strong>3</strong></td><td>Közepes</td>
          <td th:text="${averageRange}"></td>
        </tr>
        <tr th:classappend="${grade == 2} ? 'highlight' : ''">
          <td><strong>2</strong></td><td>Elégséges</td>
          <td th:text="${passingRange}"></td>
        </tr>
        <tr th:classappend="${grade == 1} ? 'highlight' : ''">
          <td><strong>1</strong></td><td>Elégtelen</td>
          <td th:text="${quiz.passingThreshold} + '% alatt'"></td>
        </tr>
      </tbody>
    </table>

    <a th:href="@{/courses/{id}(id=${course.id})}" class="btn-back">
      <i class="fas fa-arrow-left me-2"></i>Vissza a kurzushoz
    </a>

  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
