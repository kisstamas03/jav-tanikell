<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${presentation.fileName}">Prezentáció Megtekintése</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #333; }
    .toolbar { background-color: #212529; padding: 10px 20px; color: white; display: flex; justify-content: space-between; align-items: center; }
    .document-container { height: calc(100% - 56px); width: 100%; display: flex; justify-content: center; align-items: center; }
    iframe { width: 100%; height: 100%; border: none; }
    .non-pdf-fallback { color: white; text-align: center; }
  </style>
</head>
<body>

<div class="toolbar">
  <h5 class="mb-0 text-truncate" style="max-width: 60%;" th:text="${presentation.fileName}">Fájlnév</h5>
  <div>
    <a th:href="@{/courses/{id}(id=${courseId})}" class="btn btn-outline-light btn-sm me-2">
      <i class="fas fa-arrow-left me-1"></i>Vissza
    </a>
    <a th:href="@{/presentations/{id}/content(id=${presentation.id})}" class="btn btn-primary btn-sm" download>
      <i class="fas fa-download me-1"></i>Letöltés
    </a>
  </div>
</div>

<div class="document-container">
  <iframe th:if="${presentation.fileName.toLowerCase().endsWith('.pdf')}"
          th:src="@{/presentations/{id}/content(id=${presentation.id})}">
  </iframe>

  <div th:unless="${presentation.fileName.toLowerCase().endsWith('.pdf')}" class="non-pdf-fallback">
    <i class="fas fa-file-powerpoint fa-4x mb-3 text-warning"></i>
    <h3>Ez egy PowerPoint fájl</h3>
    <p>A böngésző nem tudja közvetlenül megjeleníteni a PPT formátumot.</p>
    <a th:href="@{/presentations/{id}/content(id=${presentation.id})}" class="btn btn-warning mt-2" download>
      <i class="fas fa-download me-1"></i>Kattints ide a letöltéshez és megnyitáshoz
    </a>
  </div>
</div>

</body>
</html>
