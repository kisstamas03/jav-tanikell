<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Oldal nem található</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
        }

        body {
            background: linear-gradient(135deg, var(--primary-color) 0%, #3b82f6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .error-container {
            text-align: center;
        }

        .error-code {
            font-size: 150px;
            font-weight: 900;
            text-shadow: 0 10px 30px rgba(0,0,0,0.3);
            line-height: 1;
        }

        .error-icon {
            font-size: 100px;
            margin-bottom: 30px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
<div class="error-container">
    <div class="error-icon">
        <i class="fas fa-exclamation-triangle"></i>
    </div>
    <h1 class="error-code">404</h1>
    <h2 class="mb-4">Oldal nem található</h2>
    <p class="lead mb-5">Sajnos a keresett oldal nem létezik vagy áthelyezték.</p>
    <div class="d-flex gap-3 justify-content-center">
        <a href="/" class="btn btn-light btn-lg">
            <i class="fas fa-home me-2"></i>Főoldal
        </a>
        <a href="/courses" class="btn btn-outline-light btn-lg">
            <i class="fas fa-book me-2"></i>Kurzusok
        </a>
    </div>
</div>
</body>
</html>
