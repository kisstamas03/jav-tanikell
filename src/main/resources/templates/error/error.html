<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiba történt</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
        }

        body {
            background: linear-gradient(135deg, #dc2626 0%, #ef4444 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .error-container {
            text-align: center;
        }

        .error-icon {
            font-size: 100px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
<div class="error-container">
    <div class="error-icon">
        <i class="fas fa-times-circle"></i>
    </div>
    <h1 class="display-4 mb-4">Hiba történt</h1>
    <p class="lead mb-5">Valami nem sikerült. Kérjük próbáld újra később.</p>
    <div class="d-flex gap-3 justify-content-center">
        <a href="javascript:history.back()" class="btn btn-light btn-lg">
            <i class="fas fa-arrow-left me-2"></i>Vissza
        </a>
        <a href="/" class="btn btn-outline-light btn-lg">
            <i class="fas fa-home me-2"></i>Főoldal
        </a>
    </div>
</div>
</body>
</html>
