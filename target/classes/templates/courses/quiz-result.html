<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teszt Eredmény - E-Learning Platform</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { background: #f8fafc; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .result-card { background: white; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 50px 40px; text-align: center; max-width: 500px; width: 100%; border: 1px solid #e2e8f0; }

    .icon-circle { width: 100px; height: 100px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 25px; color: white; }
    /* Dinamikus színek aszerint, hogy milyen lett az eredmény (Thymeleaf fogja állítani) */
    .bg-success-custom { background: linear-gradient(135deg, #10b981 0%, #059669 100%); box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3); }
    .bg-warning-custom { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); box-shadow: 0 8px 20px rgba(245, 158, 11, 0.3); }
    .bg-danger-custom { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); box-shadow: 0 8px 20px rgba(239, 68, 68, 0.3); }

    .score-text { font-size: 48px; font-weight: 800; color: #0f172a; line-height: 1; margin-bottom: 5px; }
    .score-subtext { color: #64748b; font-size: 16px; font-weight: 500; margin-bottom: 30px; }

    .details-box { background: #f1f5f9; border-radius: 10px; padding: 20px; margin-bottom: 30px; text-align: left; }
    .detail-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 15px; color: #334155; }
    .detail-row:last-child { margin-bottom: 0; border-top: 1px solid #e2e8f0; padding-top: 10px; margin-top: 10px; font-weight: bold; }
  </style>
</head>
<body>

<div class="container">
  <div class="result-card mx-auto">

    <div class="icon-circle" th:classappend="${percentage >= 75 ? 'bg-success-custom' : (percentage >= 50 ? 'bg-warning-custom' : 'bg-danger-custom')}">
      <i th:class="${percentage >= 50 ? 'fas fa-trophy' : 'fas fa-times-circle'}"></i>
    </div>

    <h2 class="fw-bold mb-2" th:text="${percentage >= 50 ? 'Szép munka!' : 'Sajnáljuk...'}">Gratulálunk!</h2>
    <p class="text-muted mb-4">Sikeresen befejezted a(z) <strong th:text="${quiz.title}">Teszt nevét</strong>!</p>

    <div class="score-text" th:text="${percentage + '%'}">100%</div>
    <div class="score-subtext">Elért eredmény</div>

    <div class="details-box">
      <div class="detail-row">
        <span>Összes kérdés:</span>
        <span th:text="${totalQuestions}">10</span>
      </div>
      <div class="detail-row">
        <span>Helyes válaszok:</span>
        <span class="text-success fw-bold" th:text="${score}">8</span>
      </div>
      <div class="detail-row">
        <span>Hibás válaszok:</span>
        <span class="text-danger fw-bold" th:text="${totalQuestions - score}">2</span>
      </div>
    </div>

    <a th:href="@{/courses/{id}(id=${course.id})}" class="btn btn-primary btn-lg w-100">
      <i class="fas fa-sign-out-alt me-2"></i>Vissza a kurzushoz
    </a>
  </div>
</div>

</body>
</html>
