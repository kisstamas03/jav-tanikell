<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="|${presentation.fileName} – ME-Learning|">PDF Nézegető</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link th:href="@{/css/main.css}" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <button class="toggle-btn" id="toggleSidebar"><i class="fas fa-bars"></i></button>
    <div class="file-name" th:text="${presentation.fileName}">dokumentum.pdf</div>
  </div>
  <div class="topbar-right">
    <a th:href="@{/presentations/{id}/content(id=${presentation.id})}" class="tb-btn tb-btn-primary" download>
      <i class="fas fa-download"></i>Letöltés
    </a>
    <a th:href="@{/courses/{id}(id=${courseId})}" class="tb-btn">
      <i class="fas fa-times"></i>Bezárás
    </a>
  </div>
</div>

<div class="viewer-layout">
  <div class="thumb-sidebar" id="thumbSidebar">
    <div class="thumb-header"><i class="fas fa-th-large me-2"></i>Oldalak</div>
    <div class="thumb-list" id="thumbList"></div>
  </div>

  <div class="main-viewer">
    <div class="canvas-wrap">
      <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">PDF betöltése…</div>
      </div>
      <canvas id="pdf-canvas"></canvas>
    </div>

    <div class="controls">
      <div class="ctrl-group">
        <button class="ctrl-btn" id="firstPage" title="Első"><i class="fas fa-step-backward"></i></button>
        <button class="ctrl-btn" id="prevPage"  title="Előző"><i class="fas fa-chevron-left"></i></button>
        <div class="page-info"><strong id="pageNum">1</strong> / <span id="pageCount">?</span></div>
        <button class="ctrl-btn" id="nextPage"  title="Következő"><i class="fas fa-chevron-right"></i></button>
        <button class="ctrl-btn" id="lastPage"  title="Utolsó"><i class="fas fa-step-forward"></i></button>
      </div>
      <div class="ctrl-group">
        <button class="ctrl-btn" id="zoomOut" title="Kicsinyítés"><i class="fas fa-search-minus"></i></button>
        <div class="zoom-info"><span id="zoomPct">100</span>%</div>
        <button class="ctrl-btn" id="zoomIn"  title="Nagyítás"><i class="fas fa-search-plus"></i></button>
        <button class="ctrl-btn" id="fitPage" title="Illesztés"><i class="fas fa-compress-arrows-alt"></i></button>
      </div>
    </div>
  </div>
</div>

<script th:inline="javascript">
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const presId = /*[[${presentation.id}]]*/ 1;
  const canvas = document.getElementById('pdf-canvas');
  const ctx    = canvas.getContext('2d');
  let pdf = null, pageNum = 1, rendering = false, pending = null, scale = 1.5;

  pdfjsLib.getDocument(`/presentations/${presId}/content`).promise.then(doc => {
    pdf = doc;
    document.getElementById('pageCount').textContent = doc.numPages;
    document.getElementById('loadingOverlay').style.display = 'none';
    renderPage(1);
    buildThumbs();
  }).catch(() => {
    document.getElementById('loadingOverlay').innerHTML =
      '<div style="color:#EF4444;"><i class="fas fa-exclamation-circle me-2"></i>Hiba a betöltés közben.</div>';
  });

  function renderPage(n) {
    rendering = true;
    pdf.getPage(n).then(pg => {
      const vp = pg.getViewport({ scale });
      canvas.width = vp.width; canvas.height = vp.height;
      pg.render({ canvasContext: ctx, viewport: vp }).promise.then(() => {
        rendering = false;
        if (pending !== null) { renderPage(pending); pending = null; }
      });
    });
    pageNum = n;
    document.getElementById('pageNum').textContent = n;
    updateActiveThumb(n);
    updateBtns();
    document.getElementById('zoomPct').textContent = Math.round(scale * 100);
  }

  function queueRender(n) { if (rendering) pending = n; else renderPage(n); }

  function buildThumbs() {
    const list = document.getElementById('thumbList');
    for (let i = 1; i <= pdf.numPages; i++) {
      const item = document.createElement('div');
      item.className = 'thumb-item'; item.dataset.page = i;
      const tc = document.createElement('canvas'); tc.className = 'thumb-canvas';
      const lbl = document.createElement('div'); lbl.className = 'thumb-label'; lbl.textContent = `${i}. oldal`;
      item.appendChild(tc); item.appendChild(lbl); list.appendChild(item);
      item.addEventListener('click', () => queueRender(+item.dataset.page));
      pdf.getPage(i).then(pg => {
        const vp = pg.getViewport({ scale: 0.26 });
        tc.width = vp.width; tc.height = vp.height;
        pg.render({ canvasContext: tc.getContext('2d'), viewport: vp });
      });
    }
    updateActiveThumb(1);
  }

  function updateActiveThumb(n) {
    document.querySelectorAll('.thumb-item').forEach(t => {
      const a = +t.dataset.page === n;
      t.classList.toggle('active', a);
      if (a) t.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });
  }

  function updateBtns() {
    document.getElementById('firstPage').disabled = pageNum === 1;
    document.getElementById('prevPage').disabled  = pageNum === 1;
    document.getElementById('nextPage').disabled  = !pdf || pageNum === pdf.numPages;
    document.getElementById('lastPage').disabled  = !pdf || pageNum === pdf.numPages;
  }

  document.getElementById('firstPage').addEventListener('click', () => { if(pageNum>1) queueRender(1); });
  document.getElementById('prevPage').addEventListener('click',  () => { if(pageNum>1) queueRender(pageNum-1); });
  document.getElementById('nextPage').addEventListener('click',  () => { if(pdf&&pageNum<pdf.numPages) queueRender(pageNum+1); });
  document.getElementById('lastPage').addEventListener('click',  () => { if(pdf) queueRender(pdf.numPages); });
  document.getElementById('zoomIn').addEventListener('click',    () => { scale=Math.min(scale+.25,4); queueRender(pageNum); });
  document.getElementById('zoomOut').addEventListener('click',   () => { scale=Math.max(scale-.25,.5); queueRender(pageNum); });
  document.getElementById('fitPage').addEventListener('click',   () => { scale=1.5; queueRender(pageNum); });
  document.getElementById('toggleSidebar').addEventListener('click', () => {
    document.getElementById('thumbSidebar').classList.toggle('collapsed');
  });
  document.addEventListener('keydown', e => {
    if(e.key==='ArrowLeft'  && pageNum>1) queueRender(pageNum-1);
    if(e.key==='ArrowRight' && pdf&&pageNum<pdf.numPages) queueRender(pageNum+1);
    if(e.key==='+'||e.key==='=') { scale=Math.min(scale+.25,4); queueRender(pageNum); }
    if(e.key==='-') { scale=Math.max(scale-.25,.5); queueRender(pageNum); }
  });
</script>
</body>
</html>
