<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="|${presentation.fileName} - Nézegető|">PDF Viewer</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root {
            --primary-color: #2563eb;
            --dark-bg: #1e293b;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: white;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Header */
        .pdf-header {
            background-color: #0f172a;
            padding: 15px 20px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            height: 70px;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-title h5 {
            margin: 0;
            font-size: 1.1rem;
        }

        .header-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        /* Main Container */
        .viewer-container {
            display: flex;
            height: calc(100vh - 70px);
            margin-top: 70px;
        }

        /* Sidebar */
        .sidebar {
            width: 200px;
            background-color: #0f172a;
            border-right: 1px solid #334155;
            overflow-y: auto;
            transition: margin-left 0.3s;
        }

        .sidebar.collapsed {
            margin-left: -200px;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #334155;
        }

        .thumbnail-container {
            padding: 10px;
        }

        .thumbnail-item {
            margin-bottom: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.2s;
            background-color: #1e293b;
        }

        .thumbnail-item:hover {
            border-color: var(--primary-color);
        }

        .thumbnail-item.active {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.3);
        }

        .thumbnail-canvas {
            width: 100%;
            height: auto;
            display: block;
        }

        .thumbnail-number {
            text-align: center;
            padding: 8px;
            background-color: #0f172a;
            font-size: 0.85rem;
        }

        /* Main Viewer */
        .main-viewer {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #1e293b;
            position: relative;
            overflow: hidden;
        }

        .canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
            padding: 20px;
        }

        #pdf-canvas {
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            background: white;
        }

        /* Controls */
        .viewer-controls {
            background-color: #0f172a;
            padding: 15px 20px;
            border-top: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .control-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn-control {
            background-color: #334155;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-control:hover:not(:disabled) {
            background-color: var(--primary-color);
        }

        .btn-control:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page-info {
            background-color: #334155;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.95rem;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(30, 41, 59, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .spinner {
            border: 4px solid #334155;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 150px;
            }

            .header-title h5 {
                font-size: 0.9rem;
            }

            .btn-control span {
                display: none;
            }
        }
    </style>
</head>
<body>

<!-- Header -->
<div class="pdf-header">
    <div class="header-title">
        <button class="btn-control btn-icon" id="toggleSidebar" title="Oldalsáv">
            <i class="fas fa-bars"></i>
        </button>
        <div>
            <h5 th:text="${presentation.fileName}">presentation.pdf</h5>
        </div>
    </div>
    <div class="header-controls">
        <a th:href="@{/courses/presentation/{id}/download(id=${presentation.id})}" class="btn-control">
            <i class="fas fa-download"></i>
            <span>Letöltés</span>
        </a>
        <a th:href="@{/courses/{id}(id=${courseId})}" class="btn-control">
            <i class="fas fa-times"></i>
            <span>Bezárás</span>
        </a>
    </div>
</div>

<!-- Main Container -->
<div class="viewer-container">
    <!-- Sidebar with Thumbnails -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h6 class="mb-0">
                <i class="fas fa-images me-2"></i>Előnézetek
            </h6>
        </div>
        <div class="thumbnail-container" id="thumbnails">
            <!-- Thumbnails will be generated here -->
        </div>
    </div>

    <!-- Main Viewer -->
    <div class="main-viewer">
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
        </div>

        <div class="canvas-container">
            <canvas id="pdf-canvas"></canvas>
        </div>

        <!-- Controls -->
        <div class="viewer-controls">
            <div class="control-group">
                <button class="btn-control btn-icon" id="firstPage" title="Első oldal">
                    <i class="fas fa-step-backward"></i>
                </button>
                <button class="btn-control btn-icon" id="prevPage" title="Előző">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <div class="page-info">
                    <span id="pageNum">1</span> / <span id="pageCount">0</span>
                </div>
                <button class="btn-control btn-icon" id="nextPage" title="Következő">
                    <i class="fas fa-chevron-right"></i>
                </button>
                <button class="btn-control btn-icon" id="lastPage" title="Utolsó oldal">
                    <i class="fas fa-step-forward"></i>
                </button>
            </div>

            <div class="control-group">
                <button class="btn-control btn-icon" id="zoomOut" title="Kicsinyítés">
                    <i class="fas fa-search-minus"></i>
                </button>
                <div class="page-info">
                    <span id="zoomLevel">100</span>%
                </div>
                <button class="btn-control btn-icon" id="zoomIn" title="Nagyítás">
                    <i class="fas fa-search-plus"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    // PDF.js setup
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    // Variables
    const presentationId = /*[[${presentation.id}]]*/ 1;
    const pdfUrl = `/courses/presentation/${presentationId}`;
    let pdfDoc = null;
    let pageNum = 1;
    let pageRendering = false;
    let pageNumPending = null;
    let scale = 1.5;
    const canvas = document.getElementById('pdf-canvas');
    const ctx = canvas.getContext('2d');

    // Load PDF
    pdfjsLib.getDocument(pdfUrl).promise.then(function(pdf) {
        pdfDoc = pdf;
        document.getElementById('pageCount').textContent = pdf.numPages;
        document.getElementById('loadingOverlay').style.display = 'none';
        renderPage(pageNum);
        generateThumbnails();
    }).catch(function(error) {
        console.error('Error loading PDF:', error);
        alert('Hiba történt a PDF betöltése során.');
    });

    // Render page
    function renderPage(num) {
        pageRendering = true;
        pdfDoc.getPage(num).then(function(page) {
            const viewport = page.getViewport({ scale: scale });
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            const renderContext = {
                canvasContext: ctx,
                viewport: viewport
            };

            const renderTask = page.render(renderContext);
            renderTask.promise.then(function() {
                pageRendering = false;
                if (pageNumPending !== null) {
                    renderPage(pageNumPending);
                    pageNumPending = null;
                }
            });
        });

        document.getElementById('pageNum').textContent = num;
        updateActiveThumb(num);
        updateButtons();
    }

    function queueRenderPage(num) {
        if (pageRendering) {
            pageNumPending = num;
        } else {
            renderPage(num);
        }
    }

    // Navigation
    document.getElementById('firstPage').addEventListener('click', function() {
        if (pageNum <= 1) return;
        pageNum = 1;
        queueRenderPage(pageNum);
    });

    document.getElementById('prevPage').addEventListener('click', function() {
        if (pageNum <= 1) return;
        pageNum--;
        queueRenderPage(pageNum);
    });

    document.getElementById('nextPage').addEventListener('click', function() {
        if (pageNum >= pdfDoc.numPages) return;
        pageNum++;
        queueRenderPage(pageNum);
    });

    document.getElementById('lastPage').addEventListener('click', function() {
        if (pageNum >= pdfDoc.numPages) return;
        pageNum = pdfDoc.numPages;
        queueRenderPage(pageNum);
    });

    // Keyboard navigation
    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowLeft' && pageNum > 1) {
            pageNum--;
            queueRenderPage(pageNum);
        } else if (e.key === 'ArrowRight' && pageNum < pdfDoc.numPages) {
            pageNum++;
            queueRenderPage(pageNum);
        }
    });

    // Zoom
    document.getElementById('zoomIn').addEventListener('click', function() {
        scale += 0.25;
        updateZoomLevel();
        queueRenderPage(pageNum);
    });

    document.getElementById('zoomOut').addEventListener('click', function() {
        if (scale <= 0.5) return;
        scale -= 0.25;
        updateZoomLevel();
        queueRenderPage(pageNum);
    });

    function updateZoomLevel() {
        document.getElementById('zoomLevel').textContent = Math.round(scale * 100);
    }

    // Thumbnails
    function generateThumbnails() {
        const container = document.getElementById('thumbnails');
        const thumbScale = 0.3;

        for (let i = 1; i <= pdfDoc.numPages; i++) {
            const thumbDiv = document.createElement('div');
            thumbDiv.className = 'thumbnail-item';
            thumbDiv.dataset.page = i;

            const thumbCanvas = document.createElement('canvas');
            thumbCanvas.className = 'thumbnail-canvas';

            const thumbNumber = document.createElement('div');
            thumbNumber.className = 'thumbnail-number';
            thumbNumber.textContent = `Oldal ${i}`;

            thumbDiv.appendChild(thumbCanvas);
            thumbDiv.appendChild(thumbNumber);
            container.appendChild(thumbDiv);

            pdfDoc.getPage(i).then(function(page) {
                const viewport = page.getViewport({ scale: thumbScale });
                thumbCanvas.height = viewport.height;
                thumbCanvas.width = viewport.width;

                const renderContext = {
                    canvasContext: thumbCanvas.getContext('2d'),
                    viewport: viewport
                };

                page.render(renderContext);
            });

            thumbDiv.addEventListener('click', function() {
                pageNum = parseInt(this.dataset.page);
                queueRenderPage(pageNum);
            });
        }
    }

    function updateActiveThumb(num) {
        document.querySelectorAll('.thumbnail-item').forEach(function(thumb) {
            thumb.classList.remove('active');
            if (parseInt(thumb.dataset.page) === num) {
                thumb.classList.add('active');
                thumb.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        });
    }

    function updateButtons() {
        document.getElementById('firstPage').disabled = pageNum === 1;
        document.getElementById('prevPage').disabled = pageNum === 1;
        document.getElementById('nextPage').disabled = pageNum === pdfDoc.numPages;
        document.getElementById('lastPage').disabled = pageNum === pdfDoc.numPages;
    }

    // Sidebar toggle
    document.getElementById('toggleSidebar').addEventListener('click', function() {
        document.getElementById('sidebar').classList.toggle('collapsed');
    });

    updateZoomLevel();
</script>
</body>
</html>
